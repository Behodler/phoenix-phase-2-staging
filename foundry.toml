[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 10000
via_ir = true
fs_permissions = [
    { access = "read-write", path = "./server/deployments" },
    { access = "read", path = "./scripts/snapshots" },
]

auto_detect_remappings = false
remappings = [
    "@phlimbo-ea/=lib/phlimbo-ea/src/",
    "@phUSD-stable-minter/=lib/phUSD-stable-minter/src/",
    "@stable-yield-accumulator/=lib/stable-yield-accumulator/src/",
    "@openzeppelin/contracts/=lib/phUSD-stable-minter/lib/openzeppelin-contracts/contracts/",
    "@forge-std/=lib/forge-std/src/",
    "@vault-interfaces/=lib/vault/src/interfaces/",
    "@vault/=lib/vault/src/",
    "@pauser/=lib/pauser/src/",
    "pauser/=lib/pauser/src/",
    "forge-std/=lib/forge-std/src/",
    "lib/mutable/pauser/=lib/pauser/",
    "vault/interfaces/=lib/vault/src/interfaces/",
    "phlimbo-ea/=lib/phlimbo-ea/src/",
    # --- Diamond-dependency canonicalization ---------------------------------
    # After the recursive submodule bump, each top-level submodule vendors its
    # OWN nested copy of the shared deps (pauser, vault, yield-claim-nft,
    # phlimbo-ea, flax-token). Compiling two submodules together would then pull
    # the same interface (e.g. IPausable) from two physical files -> "Identifier
    # already declared". Redirect every nested copy to the single top-level
    # pinned submodule so there is exactly one physical source per interface.
    # pauser -> lib/pauser
    "lib/phUSD-stable-minter/lib/pauser/=lib/pauser/",
    "lib/stable-yield-accumulator/lib/pauser/=lib/pauser/",
    "lib/vault/lib/mutable/pauser/=lib/pauser/",
    "lib/nft-staking/lib/mutable/pauser/=lib/pauser/",
    "lib/yield-claim-nft/lib/mutable/pauser/=lib/pauser/",
    "lib/phlimbo-ea/lib/mutable/pauser/=lib/pauser/",
    "lib/phUSD-stable-minter/lib/vault/lib/mutable/pauser/=lib/pauser/",
    "lib/stable-yield-accumulator/lib/vault/lib/mutable/pauser/=lib/pauser/",
    "lib/stable-yield-accumulator/lib/yield-claim-nft/lib/mutable/pauser/=lib/pauser/",
    "lib/stable-yield-accumulator/lib/phlimbo-ea/lib/mutable/pauser/=lib/pauser/",
    "lib/nft-staking/lib/mutable/yield-claim-nft/lib/mutable/pauser/=lib/pauser/",
    # vault -> lib/vault
    "lib/phUSD-stable-minter/lib/vault/=lib/vault/",
    "lib/stable-yield-accumulator/lib/vault/=lib/vault/",
    # yield-claim-nft -> lib/yield-claim-nft
    "lib/stable-yield-accumulator/lib/yield-claim-nft/=lib/yield-claim-nft/",
    "lib/nft-staking/lib/mutable/yield-claim-nft/=lib/yield-claim-nft/",
    # phlimbo-ea -> lib/phlimbo-ea
    "lib/stable-yield-accumulator/lib/phlimbo-ea/=lib/phlimbo-ea/",
    # flax-token -> lib/flax-token-v2
    "lib/phUSD-stable-minter/lib/flax-token/=lib/flax-token-v2/",
    "openzeppelin-contracts/=lib/phUSD-stable-minter/lib/openzeppelin-contracts/",
    "erc4626-tests/=lib/phUSD-stable-minter/lib/openzeppelin-contracts/lib/erc4626-tests/",
    "halmos-cheatcodes/=lib/phUSD-stable-minter/lib/openzeppelin-contracts/lib/halmos-cheatcodes/src/",
    "v4-core/=lib/stable-yield-accumulator/lib/v4-periphery/lib/v4-core/src/",
    "v4-periphery/=lib/stable-yield-accumulator/lib/v4-periphery/",
    "@uniswap/v4-core/=lib/stable-yield-accumulator/lib/v4-periphery/lib/v4-core/",
    "lib/stable-yield-accumulator/lib/openzeppelin-contracts/=lib/stable-yield-accumulator/lib/openzeppelin-contracts/",
    "@flax-token/=lib/flax-token-v2/src/",
    "lib/nft-staking/:yield-claim-nft/=lib/yield-claim-nft/src/",
    "yield-claim-nft/=lib/yield-claim-nft/src/",
    "@yield-claim-nft/=lib/yield-claim-nft/src/",
    "nft-staking/=lib/nft-staking/src/",
    "lib/yield-claim-nft/src/interfaces/IBurnable.sol=lib/pauser/src/interfaces/IBurnable.sol"
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[lint]
lint_on_build = false

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}", chain = 1 }
